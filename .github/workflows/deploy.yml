name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Connect and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 13.217.10.217
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            rm -f ~/.docker/cli-plugins/docker-buildx

            sudo chown -R ec2-user:ec2-user ~/hostel-management

            cd ~/hostel-management
            git reset --hard
            git clean -fd
            git pull origin main

            docker build -t hostel-management-backend ./backend
            docker build -t hostel-management-frontend ./frontend

            docker compose down
            docker compose up -d
